# Project-scoped Codex defaults.
# Codex loads this file only after the project is marked as trusted.

model = "gpt-5.6-luna"
model_reasoning_effort = "medium"

approval_policy = "on-request"
sandbox_mode = "workspace-write"

# Use cached web results by default.
# Change to "live" only when current external information is required.
web_search = "cached"

[agents]
# Keep the team small to limit token use and avoid conflicting edits.
max_threads = 3

# The main agent may create subagents, but subagents cannot create
# further generations of agents.
max_depth = 1

[features]
multi_agent = true
goals = true